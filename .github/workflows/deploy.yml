name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Trigger deployment webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "Missing DEPLOY_WEBHOOK_URL secret"
            exit 1
          fi

          echo "Triggering deploy webhook..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$DEPLOY_WEBHOOK_URL")

          echo "Webhook responded with status: $RESPONSE"

          if [ "$RESPONSE" -ge 400 ]; then
            echo "Deployment webhook failed"
            exit 1
          fi
