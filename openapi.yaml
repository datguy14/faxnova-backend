openapi: 3.1.0
info:
  title: FaxNova API
  version: 1.0.0
  description: >
    REST API for FaxNova — a developer-first fax delivery platform powered by Sinch.
    All protected endpoints require a Bearer API key in the Authorization header.
  contact:
    name: FaxNova Support
    email: faxnova.platform@gmail.com

servers:
  - url: https://your-render-url.onrender.com
    description: Production

security:
  - BearerAuth: []

paths:

  /health:
    get:
      summary: Health check
      description: Returns server status. No authentication required.
      security: []
      tags: [System]
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                service: faxnova-backend
                env: production

  /fax/send:
    post:
      summary: Send a fax
      description: Submit a fax job to the Sinch Fax API. Requires a publicly accessible PDF or TIFF file URL.
      tags: [Fax]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendFaxRequest'
            example:
              to: "+15551234567"
              fileUrl: "https://example.com/document.pdf"
      responses:
        '200':
          description: Fax submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendFaxResponse'
        '400':
          description: Missing or invalid request fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /fax/status/{faxId}:
    get:
      summary: Get fax status
      description: Poll the delivery status of a fax job by its ID.
      tags: [Fax]
      parameters:
        - $ref: '#/components/parameters/FaxId'
      responses:
        '200':
          description: Fax status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaxStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /fax/{faxId}/retry:
    post:
      summary: Retry a failed fax
      description: Re-submit a previously failed fax job using its original parameters.
      tags: [Fax]
      parameters:
        - $ref: '#/components/parameters/FaxId'
      responses:
        '200':
          description: Fax retry initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryFaxResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /fax/history/{faxId}:
    get:
      summary: Get fax event history
      description: Returns all logged status events for a given fax ID.
      tags: [Fax]
      parameters:
        - $ref: '#/components/parameters/FaxId'
      responses:
        '200':
          description: Event history returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaxEventHistoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /fax/webhook:
    post:
      summary: Receive fax delivery events from Sinch
      description: >
        Webhook endpoint for Sinch to POST fax status updates.
        Authenticate using the X-FaxNova-Webhook-Secret header.
        No Bearer token required.
      tags: [Webhooks]
      security: []
      parameters:
        - in: header
          name: X-FaxNova-Webhook-Secret
          required: true
          schema:
            type: string
          description: Shared webhook secret configured via FAX_WEBHOOK_SECRET env var
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookPayload'
            example:
              faxId: "fax_abc123"
              status: "delivered"
              providerEvent: "FAX_DELIVERED"
      responses:
        '200':
          description: Event accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  correlationId:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid or missing webhook secret

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        API key authentication. Generate a key with `openssl rand -hex 32`
        and set it as FAXNOVA_API_KEY in your environment.
        Pass it as: Authorization: Bearer <your_api_key>

  parameters:
    FaxId:
      in: path
      name: faxId
      required: true
      schema:
        type: string
      description: The unique fax job ID returned by POST /fax/send

  responses:
    BadRequest:
      description: Invalid or missing parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or malformed Authorization header
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Unauthorized
            details: "Missing or malformed Authorization header. Expected: Bearer <api_key>"
    Forbidden:
      description: Invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Forbidden
            details: Invalid API key
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: faxnova-backend
        env:
          type: string
          example: production

    SendFaxRequest:
      type: object
      required: [to, fileUrl]
      properties:
        to:
          type: string
          description: Destination fax number in E.164 format
          example: "+15551234567"
        fileUrl:
          type: string
          description: Publicly accessible URL to a PDF or TIFF file
          example: "https://example.com/document.pdf"

    SendFaxResponse:
      type: object
      properties:
        success:
          type: boolean
        faxId:
          type: string
        status:
          type: string
          example: submitted
        correlationId:
          type: string

    FaxStatusResponse:
      type: object
      properties:
        faxId:
          type: string
        status:
          type: string
          enum: [submitted, processing, delivered, failed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        correlationId:
          type: string

    RetryFaxResponse:
      type: object
      properties:
        message:
          type: string
          example: Fax retry initiated successfully
        data:
          type: object
        correlationId:
          type: string

    FaxEventHistoryResponse:
      type: object
      properties:
        success:
          type: boolean
        faxId:
          type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/FaxEvent'

    FaxEvent:
      type: object
      properties:
        faxId:
          type: string
        status:
          type: string
        providerEvent:
          type: string
          nullable: true
        errorCode:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        correlationId:
          type: string
        source:
          type: string
        timestamp:
          type: string
          format: date-time

    WebhookPayload:
      type: object
      required: [faxId, status]
      properties:
        faxId:
          type: string
        status:
          type: string
        providerEvent:
          type: string
          nullable: true
        errorCode:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
          nullable: true
        correlationId:
          type: string
          nullable: true
